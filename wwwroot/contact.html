<html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
<style>

    body {
            margin: 0;
            padding: 0;
            background: gainsboro;
            font-family: Arial, Helvetica, sans-serif
        }

    @media (min-width: 600px) {

  #nav-links {
    display: flex !important;
    gap: 20px;
  }

  .topnav a.icon {
    display: none !important;
  }

  #nav-links a {
    display: inline-block;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
}

@media (min-width: 1000px) {
  #nav-links {
    gap: 30px;
  }

  .logo img {
    height: 50px;
  }
}



.topnav {
  display: flex;
  overflow: hidden;
  background-color: #333;
  position: relative;
}

.topnav #nav-links {
  display: none;
}

.topnav a {
  color: white;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  display: block;
}

.topnav a.icon {
  background: black;
  display: block;
  position: absolute;
  right: 0;
  top: 0;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}


.logo img {
  height: 40px;
  width: auto;
  vertical-align: middle;
}
.contact-header {
    text-align: center;
    padding: 30px 20px;
}

.contact-header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.contact-header p {
    color: #555;
}

.contact-form-section {
    padding: 20px;
}

.contact-form {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.contact-form label {
    font-weight: 600;
    margin-bottom: 5px;
}

.contact-form input,
.contact-form textarea {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 1rem;
}

.contact-btn {
    display: inline-block;
        margin-top: 15px;
        background-color: #191b1a;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 25px;
        font-size: 1.1rem;
        font-weight: 600;
        transition: 0.3s ease;
}

.contact-btn:hover {
    background-color: #202221;
    transform: scale(1.03);
}

.contact-info {
    max-width: 600px;
    margin: 40px auto;
    padding:0 20px;
    text-align: center;
}

.contact-info h2 {
    margin-bottom: 10px;
}

.site-footer {
    background-color: #333;
    color: white;
    text-align: center;
    padding: 15px 10px;
    font-size: 0.9rem;
    margin-top: 40px;
}

@media (min-width: 768px) {
    .site-footer {
        font-size: 1rem;
        padding: 20px;
    }
}
</style>

<body>

<div class="mobile-container">

<div class="topnav">
  <a href="index.html" class="logo">
    <img src="images/company_logo.png" alt="Site Logo">
    </a>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="admin.html">Admin</a>
  </div>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>



</div>

<!-- JavaScript for mobile menu toggle -->
<script>

/* Function to show or hide navigation menu */
function myFunction() {

  /* Gets navigation links element, stores as x */
  var x = document.getElementById("nav-links");
  /* Toggle menu visibility */
  if (x.style.display === "block") {
    x.style.display = "none"; /*If visible, this line hides it*/
  } else {
    x.style.display = "block";
  }
}


</script>

<section class="contact-header">
    <h1>Contact Us</h1>
    <p>Have a question or problem? Send us a message and we'll get back to you.</p> 
</section>

<section class="contact-form-section">
    <form class="contact-form">

        <label for="name">Name</label>
        <input ype="text" id="name" placeholder="your name" required>

        <label for="email">Email</label>
        <input ype="email" id="email" placeholder="your email" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="your message" required></textarea>

        <a href="contact-confirmed.html" class="contact-btn"> Send Message</a>
    </form>
</section>

<section class="contact-info">
    <h2>Contact Details</h2>
    <p><strong>Email:</strong> info@eventsphere.com</p>
    <p><strong>Location:</strong>Nottingham, UK</p>

</section>

<footer class="site-footer">
    <p>© 2025 Olusegun Taiwo - Internet Application Programming</p>
</footer>

</body>
</html>
