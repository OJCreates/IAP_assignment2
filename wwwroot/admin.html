<html>
<head>
    <!-- Page title shown in browser tab -->
    <title>Admin Panel</title> 
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
    <link rel="stylesheet" href="/admin.css">
</head>
<style>

/* ---------- RESPONSIVE NAVIGATION (TABLET+) ---------- */
@media (min-width: 600px) {

  /* Show navigation links in a row */
  #nav-links {
    display: flex !important;
    gap: 20px;
  }

  /* Hide hamburger icon on larger screens */
  .topnav a.icon {
    display: none !important;
  }

  /* Ensure links display inline */
  #nav-links a {
    display: inline-block;
  }

   /* Align navbar content horizontally */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
}

/* ---------- LARGE SCREENS ---------- */
@media (min-width: 1000px) {
  #nav-links {
    gap: 30px;
  }

   /* Increase logo size on large screens */
  .logo img {
    height: 50px;
  }
}


/* ---------- NAVIGATION BAR STYLES ---------- */
.topnav {
  display: flex;    /* Flexbox layout */
  overflow: hidden; /* Hide overflow */
  background-color: #333;
  position: relative; /* Needed for absolute positioning */
}

/* Hide nav links by default (mobile-first design) */
.topnav #nav-links {
  display: none;
}

/* Navigation link styling */
.topnav a {
  color: white;
  padding: 14px 16px;   /* Space inside links */
  text-decoration: none;
  font-size: 17px;
  display: block;   
}

/* Hamburger icon styling */
.topnav a.icon {
  background: black;
  display: block;       /* Make visible */
  position: absolute;   /* Position inside navbar */
  right: 0;
  top: 0;
}

/* Hover effect for navigation links */
.topnav a:hover {
  background-color: #ddd;
  color: black;
}

/* ---------- LOGO ---------- */
.logo img {
  height: 40px;
  width: auto;  /* Maintain aspect ratio */
  vertical-align: middle;
}

/* ---------- PAGE BODY ---------- */
    body {
            margin: 0;    /* Remove default margin */
            padding: 0;   /* Remove default padding */
            background: gainsboro;  
            font-family: Arial, Helvetica, sans-serif
        }

/* ---------- ADMIN HEADER ---------- */
    .admin-header {
    text-align: center;
    font-family: 'Lato', sans-serif;
    padding: 30px 20px;
}

/* ---------- ADMIN SECTIONS ---------- */
.admin-events, .admin-add-event {
    font-family: 'Lato', sans-serif;
    max-width: 700px;
    margin: 0 auto 40px;
    padding: 0 20px;
}

/* Container for event list */
#events-container {
    border: 1px solid #ccc;
    padding: 15px;
    border-radius: 10px;
}

/* Individual event rows */
.event-row {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

/* Remove border from last event */
.event-row:last-child {
    border-bottom: none;
}

/* ---------- ADD EVENT FORM ---------- */
.admin-add-event form {
    display: flex;
    flex-direction: column;   /* Vertical stacking */
    gap: 12px;
}

/* Form inputs */
.admin-add-event input,
.admin-add-event textarea {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Submit button */
.admin-add-event button {
    display: inline-block;
    margin-top: 15px;
    background-color: #191b1a;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 25px;
    font-size: 1.1rem;
    font-weight: 600;
    transition: 0.3s ease;
}

/* Button hover effect */
.admin-add-event button:hover {
    background-color: #202221;
    transform: scale(1.03);
}

.site-footer {
    background-color: #333;
    color: white;
    text-align: center;
    padding: 15px 10px;
    font-size: 0.9rem;
    margin-top: 40px;
}

@media (min-width: 768px) {
    .site-footer {
        font-size: 1rem;
        padding: 20px;
    }
}
</style>
<body>

<!-- Mobile navigation wrapper -->
<div class="mobile-container">

<div class="topnav">

  <!-- Logo linking to home page -->
  <a href="index.html" class="logo">
    <img src="images/company_logo.png" alt="Site Logo">
    </a>

  <!-- Navigation links -->
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="admin.html">Admin</a>
  </div>

  <!-- Hamburger menu icon -->
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">    <!--Creates clickable link and prevents link from navigating to other page-->
    <i class="fa fa-bars"></i>    <!--Font Awesome hamburger icon - three horizontal bars-->
  </a>
</div>



</div>

<script>
function myFunction() {
  var x = document.getElementById("nav-links");
  if (x.style.display === "block") {
    x.style.display = "none";
  } else {
    x.style.display = "block";
  }
}
</script>

<header>

</header>

<section class="admin-header">
    <h1>Admin Panel</h1>
    <p>Manage your events below.</p>
</section>

<section class="admin-events">
    <h2>Current Events</h2>
    <div id="events-container">

    </div>

</section>

<section class="admin-add-event">
    <h2> Add New Event</h2>

    <form id="addEventForm">
        <label>Title</label>
        <input type="text" id="title" required>

        <label>Description</label>
        <textarea id="description" required></textarea>

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Capacity</label>
        <input type="number" id="capacity" required>

        <button type="submit">Add Event</button>
    </form>
</section>


<script src="/admin.js"></script>

<footer class="site-footer">
    <p>© 2025 Olusegun Taiwo - Internet Application Programming</p>
</footer>
</body>
</html>
