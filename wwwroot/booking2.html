<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        @media (min-width: 600px) {

  #nav-links {
    display: flex !important;
    gap: 20px;
  }

  .topnav a.icon {
    display: none !important;
  }

  #nav-links a {
    display: inline-block;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
}

@media (min-width: 1000px) {
  #nav-links {
    gap: 30px;
  }

  .logo img {
    height: 50px;
  }
}



.topnav {
  display: flex;
  overflow: hidden;
  background-color: #333;
  position: relative;
}

.topnav #nav-links {
  display: none;
}

.topnav a {
  color: white;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  display: block;
}

.topnav a.icon {
  background: black;
  display: block;
  position: absolute;
  right: 0;
  top: 0;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}


.logo img {
  height: 40px;
  width: auto;
  vertical-align: middle;
}



        body {
            margin: 0;
            padding: 0;
            background: gainsboro;
            font-family: Arial, Helvetica, sans-serif
        }

        .booking-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            border-color: #191b1a;
            outline: none;
        }

        .submit-btn {
            display: inline-block;
             width: 95%;
            background: #191b1a;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            text-align: center;
            text-decoration: none;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #191b1a;
            transform: scale(1.03);
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #191b1a;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .site-footer {
    background-color: #333;
    color: white;
    text-align: center;
    padding: 15px 10px;
    font-size: 0.9rem;
    margin-top: 40px;
}

@media (min-width: 768px) {
    .site-footer {
        font-size: 1rem;
        padding: 20px;
    }
}
    </style>
</head>

<body>

<div class="mobile-container">

<div class="topnav">
  <a href="index.html" class="logo">
    <img src="images/company_logo.png" alt="Site Logo">
    </a>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="admin.html">Admin</a>
  </div>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>



</div>

<script>
function myFunction() {
  var x = document.getElementById("nav-links");
  if (x.style.display === "block") {
    x.style.display = "none";
  } else {
    x.style.display = "block";
  }
}
</script>

    <div class="booking-container">
        <h1>Book Your Spot</h1>
        <p>AI, Digital, & Tech Professionals Networking Event</p>
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>Number of Tickets</label>
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
             </div>

            <a href="booking-confirmed.html" class="submit-btn"> Confirm Booking</a>
            
        </form>

        <a href="events.html" class="back-btn"> Back to Events</a>
    </div>

<footer class="site-footer">
    <p>© 2025 Olusegun Taiwo - Internet Application Programming</p>
</footer>
</body>
</html>
