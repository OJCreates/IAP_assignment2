<html>
<head>
    <title>Message Received</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: gainsboro;
            font-family: Arial, Helvetica, sans-serif
        }

        @media (min-width: 600px) {

  #nav-links {
    display: flex !important;
    gap: 20px;
  }

  .topnav a.icon {
    display: none !important;
  }

  #nav-links a {
    display: inline-block;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
}

@media (min-width: 1000px) {
  #nav-links {
    gap: 30px;
  }

  .logo img {
    height: 50px;
  }
}



.topnav {
  display: flex;
  overflow: hidden;
  background-color: #333;
  position: relative;
}

.topnav #nav-links {
  display: none;
}

.topnav a {
  color: white;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  display: block;
}

.topnav a.icon {
  background: black;
  display: block;
  position: absolute;
  right: 0;
  top: 0;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}


.logo img {
  height: 40px;
  width: auto;
  vertical-align: middle;
}

        .confirmation-container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            background-color: #191b1a;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: #202221;
            transform: scale(1.03);
        }

        .site-footer {
    background-color: #333;
    color: white;
    text-align: center;
    padding: 15px 10px;
    font-size: 0.9rem;
    margin-top: 40px;
}

@media (min-width: 768px) {
    .site-footer {
        font-size: 1rem;
        padding: 20px;
    }
}
    </style>
</head>

<body>

    <div class="mobile-container">

<div class="topnav">
  <a href="index.html" class="logo">
    <img src="images/company_logo.png" alt="Site Logo">
    </a>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="admin.html">Admin</a>
  </div>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>



</div>

<script>
function myFunction() {
  var x = document.getElementById("nav-links");
  if (x.style.display === "block") {
    x.style.display = "none";
  } else {
    x.style.display = "block";
  }
}
</script>

    <div class="confirmation-container">
        <h1>Thank You!</h1>
        <p>Your message has been received. We will get back to you as soon as possible.</p>

        <a href="index.html" class="back-btn">Return to Home</a>
    </div>

<footer class="site-footer">
    <p>© 2025 Olusegun Taiwo - Internet Application Programming</p>
</footer>

</body>


</html>
